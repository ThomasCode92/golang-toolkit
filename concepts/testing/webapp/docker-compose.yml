services:
  webapp:
    image: cosmtrek/air
    working_dir: /app # working_dir value has to be the same of mapped volume
    ports:
      - 8080:8080
    volumes:
      - .:/app
  postgres:
    image: "postgres:14.5"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
